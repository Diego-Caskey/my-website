<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Zelda: Oracle of Seasons was released on the Gameboy Color on February 27th, 2001. This website will walk you through the manyr eason why this is an undeniable fact that cannot be disputed by any living person."
    />
    <link rel="stylesheet" href="STYLE_index.css">
    <link rel="stylesheet" href="STYLE_theater.css">
    <title>Oracle of Seasons: The best Zelda game on the Gameboy Color</title>
</head>

<body>
    <header>
        <img src="images/OoS_Logo.png" alt="English logo for Zelda: Oracle of Seasons" height="250px">
        <div id="navbar">
            <div class="nav-dropdown">
                <button class="nav-dropdown-button">&#9660; MENU</button>
                <div class="nav-dropdown-content">
                    <a href="index.html" class="toc selectable-menu">- GO BACK</a>
                </div>
            </div>
            <span class="nav-title"><span class="red-text">A</span> = START INTRO | <span class="red-text">B</span> = GO BACK</span>
        </div>
    </header>

    <main>
        <div id="gameboy-full">
            <img src="images/GameboyFrame.png" alt="Frame of a silver Gameboy" id="gameboy-body">
            <div id="gameboy-shading"></div>
            <div id="gameboy-screen">
                <video id="IntroVideo">
                    <source src="videos/Intro.mp4">
                </video>
            </div>
            <div id="buttonA"></div>
            <div id="buttonB"></div>
        </div>
    </main>
    
    <footer>
        <p>
            &copy; Diego Caskey 2026
        </p>
    </footer>

    <!-- Sound Effects Stored In "sounds" Folder -->
    <audio id="entrySound" src="sounds/Oracle_Stairs.wav" autoplay></audio>
    <audio id="aSound" src="sounds/Oracle_PauseMenu_Open.wav"></audio>
    <audio id="bSound" src="sounds/Oracle_PauseMenu_Close.wav"></audio>
    <audio id="menuOpenSound" src="sounds/Oracle_PauseMenu_Open.wav"></audio>
    <audio id="menuCloseSound" src="sounds/Oracle_PauseMenu_Close.wav"></audio>

    <!-- JavasScript to enable page tansition sound -->
    <script>
        window.addEventListener('load', () => {
        document.getElementById('entrySound').play();
        });
    </script>

    <!-- JS to enable menu functionality -->
    <script>
        const menuOpenSound = document.getElementById('menuOpenSound');
        const menuCloseSound = document.getElementById('menuCloseSound');
        const dropdown = document.querySelector('.nav-dropdown');

        dropdown.addEventListener('mouseenter', () => {
            menuOpenSound.currentTime = 0;
            menuOpenSound.play();
        });

        dropdown.addEventListener('mouseleave', () => {
            menuCloseSound.currentTime = 0;
            menuCloseSound.play();
        });
    </script>

    <!-- JS to enable button presses -->
    <script>
        const introVideo = document.getElementById('IntroVideo');
        const buttonA = document.getElementById('buttonA');
        const buttonB = document.getElementById('buttonB');
        const aSound = document.getElementById('aSound');
        const bSound = document.getElementById('bSound');

        buttonA.addEventListener('click', () => {
            aSound.currentTime = 0;
            aSound.play();
            introVideo.currentTime = 0;
            introVideo.play();
        });

        buttonB.addEventListener('click', () => {
            bSound.currentTime = 0;
            bSound.play();
            setTimeout(() => {
            window.location.href = 'index.html';
            }, 300);
        });    
    </script>
</body>
</html>
