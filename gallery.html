<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STYLE_index.css">
    <link rel="stylesheet" href="STYLE_gallery.css">
    <title>Oracle of Seasons: Sprite Gallery</title>
</head>

<body>
    <header>
        <img src="images/OoS_Logo.png" alt="English logo for Zelda: Oracle of Seasons" height="250px">
        <div id="navbar">
            <div class="nav-dropdown">
                <button class="nav-dropdown-button">&#9660; MENU</button>
                <div class="nav-dropdown-content">
                    <a href="index.html" class="toc selectable-menu">- GO BACK</a>
                </div>
            </div>
            <span class="nav-title"><span class="red-text">CLICK</span> A CARD TO VIEW</span>
        </div>
    </header>

    <main>
        <div class="sprite-grid">
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- LINK -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Link.png" alt="Link spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- ZELDA -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Zelda.png" alt="Zelda spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- NPCs -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Traders.png" alt="Traders spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- MAPLE -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Maple.png" alt="Maple spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- RICKY -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Ricky.png" alt="Ricky spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- DIMITRI -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Dimitri.png" alt="Dimitri spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- ENEMIES -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Enemies.png" alt="Enemies spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- MOOSH -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Moosh.png" alt="Moosh spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- MINIBOSSES -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Minibosses.png" alt="Miniboss spritesheet"></div>
                </div>
            </div>
            <div class="sprite-card">
                <div class="sprite-card-inner">
                    <div class="front"><h2>- ORACLES -</h2></div>
                    <div class="back"><img src="sprites/Sprites_Oracles.png" alt="Oracles spritesheet"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; Diego Caskey 2026</p>
    </footer>

    <!-- Sound Effects Stored In "sounds" Folder -->
    <audio id="entrySound" src="sounds/Oracle_Stairs.wav" autoplay></audio>
    <audio id="hoverSound" src="sounds/Oracle_Text_Letter.wav"></audio>
    <audio id="flipSound" src="sounds/Oracle_Text_Done.wav"></audio>
    <audio id="cursorSound" src="sounds/Oracle_Menu_Cursor.wav"></audio>
    <audio id="menuOpenSound" src="sounds/Oracle_PauseMenu_Open.wav"></audio>
    <audio id="menuCloseSound" src="sounds/Oracle_PauseMenu_Close.wav"></audio>

    <!-- JS to enable menu functionality -->
    <script>
        const menuOpenSound = document.getElementById('menuOpenSound');
        const menuCloseSound = document.getElementById('menuCloseSound');
        const dropdown = document.querySelector('.nav-dropdown');

        dropdown.addEventListener('mouseenter', () => {
            menuOpenSound.currentTime = 0;
            menuOpenSound.play();
        });

        dropdown.addEventListener('mouseleave', () => {
            menuCloseSound.currentTime = 0;
            menuCloseSound.play();
        });
    </script>

    <!-- JS to enable hover and flip sound functionality -->
    <script>
        const entrySound = document.getElementById('entrySound');
        const hoverSound = document.getElementById('hoverSound');
        const flipSound = document.getElementById('flipSound');
        const cursorSound = document.getElementById('cursorSound');
        const cards = document.querySelectorAll('.sprite-card');
        const navLinks = document.querySelectorAll('#navbar a');

        window.addEventListener('load', () => {
            entrySound.play();
        });

            cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                hoverSound.currentTime = 0;
                hoverSound.play();
            });

            card.addEventListener('click', () => {
                flipSound.currentTime = 0;
                flipSound.play();
                card.classList.toggle('flipped');
            });
        });

        navLinks.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursorSound.currentTime = 0;
                cursorSound.play();
            });
        });
    </script>
</body>
</html>
